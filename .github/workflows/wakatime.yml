name: Hackatime Readme Update

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    name: Update Hackatime Stats
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update Hackatime in README
        uses: athul/waka-readme@master
        env:
          # Ép action gọi tới server Hackatime của Hack Club thay vì WakaTime mặc định
          WAKATIME_API_URL: https://hackatime.hackclub.com/api/hackatime/v1
        with:
          WAKATIME_API_KEY: ${{ secrets.HACKATIME_API_KEY }}
          SHOW_TITLE: true
          SECTION_NAME: wakatime
          BLOCKS: ░▒▓█
          LANG_COUNT: 5
          TIME_RANGE: last_7_days
          SHOW_TIME: true
          SHOW_TOTAL: true
